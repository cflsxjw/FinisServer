name: finis
services:
  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    volumes:
      - ..:/workspace
    ports:
      - 8080:8080
    command: ["sh", "-c", "sleep infinity"]
    networks:
      - finis-network
  postgres:
    image: paradedb/paradedb:latest-pg18
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: cflsxjw
      POSTGRES_DB: finis
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 3s
        window: 120s
    networks:
      - finis-network
  redis:
    image: redis:8-trixie
    volumes:
      - redis-data:/data
    ports:
      - 6379:6379
    command: ["redis-server", "--appendonly", "yes"]
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 3s
        window: 120s
    networks:
      - finis-network
volumes:
  postgres-data:
  redis-data:
networks:
  finis-network:
    name: finis-network
    external: true
  
